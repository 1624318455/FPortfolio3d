<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>博物馆长廊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0e0e10;color:#d4d0c8;font-family:Georgia,serif;user-select:none}
#app{position:fixed;inset:0}canvas{display:block;outline:none}
#loading{position:fixed;inset:0;background:#0e0e10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity 1.2s}
#loading.hidden{opacity:0;pointer-events:none}
.lt{font-size:22px;letter-spacing:10px;color:#b8b0a0;font-weight:300;margin-bottom:10px}
.ls{font-size:10px;letter-spacing:6px;color:#6a6865;margin-bottom:50px}
.lb{width:200px;height:1px;background:rgba(180,176,168,.15);position:relative;overflow:hidden}
.lf{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#888480,#c8c0b0);width:0;transition:width .3s}
.lp{font-size:10px;color:#888480;margin-top:12px;letter-spacing:3px}
#entry{position:fixed;inset:0;background:rgba(10,10,12,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 1s;backdrop-filter:blur(8px)}
#entry.hidden{opacity:0;pointer-events:none}
.el{width:60px;height:1px;background:#b8b0a0;margin-bottom:36px}
.et{font-size:30px;letter-spacing:14px;color:#c8c0b0;font-weight:200;margin-bottom:10px}
.es{font-size:11px;letter-spacing:6px;color:#888480;margin-bottom:50px}
.eb{padding:14px 56px;background:transparent;border:1px solid #b8b0a0;color:#b8b0a0;font-size:12px;letter-spacing:8px;cursor:pointer;transition:all .4s;font-family:inherit}
.eb:hover{background:#b8b0a0;color:#0a0a0c}
.etip{position:absolute;bottom:30px;font-size:9px;color:#5a5855;letter-spacing:3px;text-align:center}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;opacity:0;transition:opacity 1s}
#hud.visible{opacity:1}
.hb{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px}
.hl{font-size:8px;color:#6a6865;letter-spacing:3px;text-shadow:0 1px 2px rgba(0,0,0,.85)}
.hbar{width:200px;height:1px;background:rgba(180,176,168,.25)}
.hfill{height:2px;background:#b8b0a0;width:0;transition:width .2s;border-radius:1px}
</style></head>
<body>
<div id="app"></div>
<div id="loading"><div class="lt">博物馆长廊</div><div class="ls">MUSEUM GALLERY</div><div class="lb"><div class="lf" id="lfill"></div></div><div class="lp" id="lpct">载入中 · 0%</div></div>
<div id="entry" style="display:none"><div class="el"></div><div class="et">博物馆长廊</div><div class="es">MUSEUM GALLERY</div><button class="eb" id="ebtn">ENTER</button><div class="etip">WASD行走 · 鼠标环顾 · 滚轮前后</div></div>
<div id="hud"><div class="hb"><div class="hl">ENTRANCE</div><div class="hbar"><div class="hfill" id="hfill"></div></div><div class="hl">FINALE</div></div></div>
<script>
(function(){var se=function(m){var p=document.getElementById('lpct');if(p)p.innerHTML='<span style=\"color:#c88;font-size:11px\">⚠ '+m+'</span>';console.error('[gallery]',m);};
window.onerror=function(e){se(e.message||String(e));};
window.onunhandledrejection=function(e){se('Promise: '+(e.reason?.message||e.reason));};
setTimeout(function(){if(!window.__booted)se('CDN超时，请刷新');},35000);})();
</script>
<script type="module">
/* ========== CDN fallback ========== */
const CDNS=[
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js',
  'https://esm.sh/three@0.160.0','https://unpkg.com/three@0.160.0/build/three.module.js'
];
var THREE=null;
for(const url of CDNS){
  try{document.getElementById('lpct').textContent='加载 '+new URL(url).host+'…';THREE=await import(url);break;}
  catch(e){console.warn('[gallery] CDN失败:',url);}
}
if(!THREE)throw new Error('所有CDN不可达');
window.__booted=true;

/* ========== 程序化纹理 ========== */
/* 强制模板：colorSpace + wrap + needsUpdate */

/* 砂岩漫反射 #b8a999 */
function createSandstoneTex(){
  const c=document.createElement('canvas');c.width=c.height=512;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#b8a999';ctx.fillRect(0,0,512,512);
  for(var i=0;i<80;i++){var y=Math.random()*512,h=2+Math.random()*5,v=170+Math.random()*30;
    ctx.fillStyle='rgba('+v+','+(v-8)+','+(v-15)+','+(Math.random()*0.2)+')';ctx.fillRect(0,y,512,h);}
  for(var i=0;i<5000;i++){var g=160+Math.random()*60;
    ctx.fillStyle='rgba('+g+','+(g-5)+','+(g-10)+','+(Math.random()*0.12)+')';ctx.fillRect(Math.random()*512,Math.random()*512,1+Math.random()*2,1+Math.random()*2);}
  var t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=4;t.needsUpdate=true;
  return t;
}

/* 砂岩凹凸高度图 */
function createHeightTex(){
  var c=document.createElement('canvas');c.width=c.height=256;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#808080';ctx.fillRect(0,0,256,256);
  for(var i=0;i<50;i++){var y=Math.random()*256,b=60+Math.random()*120;
    ctx.fillStyle='rgba('+b+','+b+','+b+','+(Math.random()*0.5)+')';ctx.fillRect(0,y,256,1+Math.random()*4);}
  for(var i=0;i<4000;i++){var b=60+Math.random()*130;
    ctx.fillStyle='rgba('+b+','+b+','+b+','+(Math.random()*0.5)+')';ctx.fillRect(Math.random()*256,Math.random()*256,1,1);}
  var t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.needsUpdate=true;
  return t;
}

/* 地毯纹理 128x1024 横向条纹 */
function createCarpetTex(){
  var c=document.createElement('canvas');c.width=128;c.height=1024;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#44484c';ctx.fillRect(0,0,128,1024);
  for(var i=0;i<1024;i+=3){var b=8+Math.sin(i*0.3)*3;
    ctx.fillStyle='rgba('+(68+b)+','+(72+b)+','+(76+b)+',0.2)';ctx.fillRect(0,i,128,1);}
  for(var i=0;i<3000;i++){var g=70+Math.random()*10;
    ctx.fillStyle='rgba('+g+','+(g+2)+','+(g+5)+','+(Math.random()*0.1)+')';ctx.fillRect(Math.random()*128,Math.random()*1024,1,1);}
  var t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,36);t.needsUpdate=true;
  return t;
}

/* 地砖纹理 256x256 浅灰石材 */
function createTileTex(){
  var c=document.createElement('canvas');c.width=c.height=256;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#c6c9cc';ctx.fillRect(0,0,256,256);
  for(var i=0;i<2000;i++){var v=190+Math.random()*30;
    ctx.fillStyle='rgba('+v+','+(v+2)+','+(v+4)+','+(Math.random()*0.1)+')';ctx.fillRect(Math.random()*256,Math.random()*256,1,1);}
  var t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.needsUpdate=true;
  return t;
}

var texSand=createSandstoneTex(),texHgt=createHeightTex(),texCrp=createCarpetTex(),texTl=createTileTex();

/* ========== 场景/相机 ========== */
/* 场景背景浅蓝#223344，区分黑墙和底色 */
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x223344);

/* 调试辅助线 */
scene.add(new THREE.AxesHelper(50));
scene.add(new THREE.GridHelper(40,20));

/* 相机 near=0.001 far=200，杜绝视锥体裁剪 */
var camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,0.001,200);
camera.position.set(0,1.65,18);
camera.lookAt(0,1.65,-18);
camera.rotation.order='YXZ';

var renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.0;
document.getElementById('app').appendChild(renderer.domElement);

/* ========== 材质 ========== */
var mFloor=new THREE.MeshStandardMaterial({map:texTl,color:0xc6c9cc,roughness:0.8,metalness:0});
var mBase=new THREE.MeshStandardMaterial({color:0xe8e3dd,roughness:0.95,metalness:0});
var mRelief=new THREE.MeshStandardMaterial({map:texSand,bumpMap:texHgt,bumpScale:0.02,color:0xb8a999,roughness:0.7,metalness:0});
var mBeam=new THREE.MeshStandardMaterial({color:0x3a3c3e,roughness:0.9,metalness:0});
var mLed=new THREE.MeshStandardMaterial({color:0xf8fafc,emissive:0xf8fafc,emissiveIntensity:0.6,roughness:0.3});
var mPlaque=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.9,metalness:0});
var mCarpet=new THREE.MeshStandardMaterial({map:texCrp,color:0x44484c,roughness:0.98,metalness:0});
var mPodium=new THREE.MeshStandardMaterial({color:0xd9d2c8,roughness:0.85,metalness:0});

/* ========== 空间常量 ========== */
var W=8,L=36,H=4.2,HW=W/2,HL=L/2;

/* ================================================================
 * 1. 地面系统
 * ================================================================ */
var TS=1.2,COLS=Math.ceil(W/TS),ROWS=Math.ceil(L/TS);
var ox=(W-COLS*TS)/2,oz=(L-ROWS*TS)/2;
for(var i=0;i<COLS;i++)for(var j=0;j<ROWS;j++){
  var x=-HW+ox+i*TS+TS/2,z=-HL+oz+j*TS+TS/2;
  var tile=new THREE.Mesh(new THREE.BoxGeometry(TS*0.995,0.04,TS*0.995),mFloor.clone());
  tile.position.set(x,0.02,z);scene.add(tile);
}
/* 中心地毯 */
var carpet=new THREE.Mesh(new THREE.PlaneGeometry(1.2,L),mCarpet);
carpet.rotation.x=-Math.PI/2;carpet.position.set(0,0.04,0);scene.add(carpet);

/* ================================================================
 * 2. 墙面分层构建（外层镂空，浮雕正面朝向走廊）
 * ================================================================ */
var BH=0.9,PW=2.4,PH=3.3,PN=Math.ceil(L/PW),REC=0.03;

for(var side=-1;side<=1;side+=2){
  /* ① 墙基全覆盖 */
  var base=new THREE.Mesh(new THREE.BoxGeometry(0.08,BH,L+0.1),mBase);
  base.position.set(side*(HW-0.01),BH/2,0);scene.add(base);

  /* ② 外围上下边框（非实心墙，预留窗口露出浮雕） */
  // 顶部横框
  var topFrame=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.05,L+0.1),mBase);
  topFrame.position.set(side*(HW-0.01),H-0.025,0);scene.add(topFrame);
  // 底部横框（墙基以上）
  var botFrame=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.05,L+0.1),mBase);
  botFrame.position.set(side*(HW-0.01),BH+0.025,0);scene.add(botFrame);
  // 每隔2.4m竖框（面板分隔）
  for(var p=0;p<=PN;p++){
    var zc=-HL+p*PW;
    var vertFrame=new THREE.Mesh(new THREE.BoxGeometry(0.06,PH,0.05),mBase);
    vertFrame.position.set(side*(HW-0.01),BH+PH/2,zc);scene.add(vertFrame);
  }

  /* ③ 浮雕石板（循环，正面朝向走廊） */
  for(var p=0;p<PN;p++){
    var zc=-HL+p*PW+PW/2;
    var panel=new THREE.Mesh(new THREE.PlaneGeometry(PW*0.94,PH*0.94),mRelief);
    panel.position.set(side*(HW-REC),BH+PH/2,zc);
    panel.rotation.y=side*Math.PI/2;
    scene.add(panel);

    /* 解说牌 */
    var plaque=new THREE.Mesh(new THREE.BoxGeometry(0.01,0.10,0.20),mPlaque);
    plaque.position.set(side*(HW-0.02),0.12,zc);
    plaque.rotation.y=side*(Math.PI/2-0.26);plaque.rotation.z=0.15*side;
    scene.add(plaque);
  }
}

/* 尽头远墙 */
var fw=new THREE.Mesh(new THREE.BoxGeometry(W+0.2,H+0.1,0.08),mBase);
fw.position.set(0,H/2,-HL);scene.add(fw);

/* ================================================================
 * 3. 阶梯吊顶（12组×3m递进）
 * ================================================================ */
var UD=3,UC=L/UD,BD=0.25,SD=0.25,RH=H-SD,SKW=3.2,SKL=2.6;
var mSky=new THREE.MeshStandardMaterial({color:0xe8e4dc,transparent:true,opacity:0.2,roughness:0.3,metalness:0,emissive:0x8899aa,emissiveIntensity:0.05});

for(var u=0;u<UC;u++){
  var zs=HL-u*UD;
  /* 横梁 */
  var beam=new THREE.Mesh(new THREE.BoxGeometry(W,0.10,BD),mBeam);
  beam.position.set(0,H-0.05,zs-BD/2);scene.add(beam);
  /* 凹框底面 */
  var rf=new THREE.Mesh(new THREE.BoxGeometry(W,0.04,UD-BD),mBase);
  rf.position.set(0,RH,zs-BD-(UD-BD)/2);scene.add(rf);
  /* 阶梯垂直面 */
  var sr=new THREE.Mesh(new THREE.BoxGeometry(W,SD,0.04),mBase);
  sr.position.set(0,RH+SD/2,zs-BD);scene.add(sr);
  /* 凹框侧壁 */
  for(var s=-1;s<=1;s+=2){
    var sw=new THREE.Mesh(new THREE.BoxGeometry(0.04,SD,UD-BD),mBase);
    sw.position.set(s*(HW-0.02),RH+SD/2,zs-BD-(UD-BD)/2);scene.add(sw);
  }
  /* 天窗 3.2×2.6m */
  var sky=new THREE.Mesh(new THREE.BoxGeometry(SKW,0.03,SKL),mSky);
  sky.position.set(0,RH+0.02,zs-BD-(UD-BD)/2);scene.add(sky);
  /* LED灯带 */
  var fl=new THREE.Mesh(new THREE.BoxGeometry(W,0.02,0.02),mLed);
  fl.position.set(0,RH-0.01,zs-BD);scene.add(fl);
  for(var s=-1;s<=1;s+=2){
    var ls=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.02,UD-BD),mLed);
    ls.position.set(s*(HW-0.02),RH-0.01,zs-BD-(UD-BD)/2);scene.add(ls);
  }
}

/* ================================================================
 * 4. 长廊尽头
 * ================================================================ */
var podium=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.9,2.2),mPodium);
podium.position.set(0,0.45,-HL+1.2);scene.add(podium);
var pTrim=new THREE.Mesh(new THREE.BoxGeometry(2.3,0.02,2.3),new THREE.MeshStandardMaterial({color:0xc8c0b0,roughness:0.7}));
pTrim.position.set(0,0.91,-HL+1.2);scene.add(pTrim);

var sMat=new THREE.MeshStandardMaterial({color:0x3a3835,roughness:0.65,metalness:0.1}),sy=0.9;
var torso=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.30,1.1,12),sMat);
torso.position.set(0,sy+0.65,-HL+1.2);scene.add(torso);
var sh=new THREE.Mesh(new THREE.CylinderGeometry(0.40,0.32,0.15,12),sMat);
sh.position.set(0,sy+1.18,-HL+1.2);scene.add(sh);
var hd=new THREE.Mesh(new THREE.SphereGeometry(0.18,12,10),sMat);
hd.position.set(0,sy+1.38,-HL+1.2);scene.add(hd);
var bp=new THREE.Mesh(new THREE.CylinderGeometry(0.40,0.45,0.10,12),sMat);
bp.position.set(0,sy+0.05,-HL+1.2);scene.add(bp);

function fig(x,d){
  var fm=new THREE.MeshStandardMaterial({color:d?0x2a2825:0xb8b0a0,roughness:0.8,metalness:0});
  var fh=new THREE.MeshStandardMaterial({color:0x7a6a58,roughness:0.8,metalness:0});
  var g=new THREE.Group();
  var body=new THREE.Mesh(new THREE.CylinderGeometry(0.20,0.25,1.2,8),fm);
  body.position.y=0.7;g.add(body);
  var head=new THREE.Mesh(new THREE.SphereGeometry(0.16,10,8),fh);
  head.position.y=1.45;g.add(head);
  for(var a=-1;a<=1;a+=2){
    var arm=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.05,0.5,6),fm);
    arm.position.set(a*0.28,d?1.15:0.85,0);arm.rotation.z=a*(d?0.3:-0.2);arm.rotation.x=d?-0.5:0;
    g.add(arm);
  }
  g.position.set(x,0,-HL+1.5);scene.add(g);
}
fig(-1.6,true);fig(1.6,false);

/* ================================================================
 * 5. 灯光（高亮度基础照明，强制照亮PBR材质）
 * ================================================================ */
/* ① 环境光 强度0.8 暖米色 */
scene.add(new THREE.AmbientLight(0xf0e9e0,0.8));

/* ② 半球天光 */
scene.add(new THREE.HemisphereLight(0xe9e2d8,0x2c2c30,0.6));

/* ③ 平行光模拟天窗自然光 */
var dir=new THREE.DirectionalLight(0xf0ece4,0.4);
dir.position.set(0,10,-10);scene.add(dir);

/* ④ 吊顶灯带点光源 + 墙面补光 */
for(var u=0;u<UC;u++){
  var zs=HL-u*UD;
  var pl=new THREE.PointLight(0xe8e0d8,0.3,8,2);
  pl.position.set(0,H-1,zs-UD/2);scene.add(pl);
  // 左右墙面补光
  for(var s=-1;s<=1;s+=2){
    var wal=new THREE.PointLight(0xf0e8e0,0.15,6,2);
    wal.position.set(s*3,H-1,zs-UD/2);scene.add(wal);
  }
}

/* ⑤ 远端补充 */
var fill=new THREE.DirectionalLight(0xe8e0d8,0.2);
fill.position.set(0,6,-HL);scene.add(fill);

/* ⑥ 展台聚光 强度0.9 扩大照射角 */
var spot=new THREE.SpotLight(0xf8f0e8,0.9,15,Math.PI*0.25,0.8,1.2);
spot.position.set(0,H,-HL+3);
spot.target.position.set(0,0.5,-HL+1.2);
scene.add(spot);scene.add(spot.target);

/* ================================================================
 * 6. 入口短墙 + 控制
 * ================================================================ */
for(var s=-1;s<=1;s+=2){
  var ew=new THREE.Mesh(new THREE.BoxGeometry(0.08,H,0.3),mBase);
  ew.position.set(s*(HW-0.01),H/2,HL-0.15);scene.add(ew);
}

scene.add(camera);
var cam={yaw:0,pitch:0};
var mx=innerWidth/2,my=innerHeight/2,isDrag=false,hasMoved=false;

document.body.style.cursor='grab';
renderer.domElement.onmousedown=function(e){if(e.button!==0)return;isDrag=true;hasMoved=false;document.body.style.cursor='grabbing';};
window.onmouseup=function(e){if(e.button!==0)return;isDrag=false;document.body.style.cursor='grab';};
window.onmousemove=function(e){var dx=e.clientX-mx,dy=e.clientY-my;
  if(isDrag){cam.yaw-=dx*0.0035;cam.pitch-=dy*0.0025;cam.pitch=Math.max(-Math.PI/3,Math.min(Math.PI/3,cam.pitch));if(Math.abs(dx)+Math.abs(dy)>8)hasMoved=true;}
  mx=e.clientX;my=e.clientY;};

var keys={w:false,a:false,s:false,d:false};
window.onkeydown=function(e){var k=e.key.toLowerCase();if(e.key==='Escape'){showExit();return;}
  if(k==='w'||e.key==='ArrowUp')keys.w=true;if(k==='s'||e.key==='ArrowDown')keys.s=true;
  if(k==='a'||e.key==='ArrowLeft')keys.a=true;if(k==='d'||e.key==='ArrowRight')keys.d=true;};
window.onkeyup=function(e){var k=e.key.toLowerCase();
  if(k==='w'||e.key==='ArrowUp')keys.w=false;if(k==='s'||e.key==='ArrowDown')keys.s=false;
  if(k==='a'||e.key==='ArrowLeft')keys.a=false;if(k==='d'||e.key==='ArrowRight')keys.d=false;};
var si=0;
window.onwheel=function(e){si+=-e.deltaY*0.0015;si=Math.max(-0.5,Math.min(0.5,si));};

function showExit(){document.getElementById('entry').style.display='flex';
  requestAnimationFrame(function(){document.getElementById('entry').classList.remove('hidden');});
  document.getElementById('ebtn').textContent='继续游览';}

/* 加载 */
var lf=document.getElementById('lfill'),lp=document.getElementById('lpct');
function setP(p){lf.style.width=(p*100).toFixed(0)+'%';lp.textContent='载入中 · '+(p*100).toFixed(0)+'%';}
var pr=0,li=setInterval(function(){pr=Math.min(1,pr+0.03+Math.random()*0.05);setP(pr);
  if(pr>=1){clearInterval(li);setTimeout(function(){document.getElementById('loading').classList.add('hidden');document.getElementById('entry').style.display='flex';},200);}},80);

document.getElementById('ebtn').onclick=function(){document.getElementById('entry').classList.add('hidden');
  setTimeout(function(){document.getElementById('entry').style.display='none';},600);
  document.getElementById('hud').classList.add('visible');};

/* ========== 主循环 ========== */
var clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);
  var dt=Math.min(0.05,clock.getDelta());
  camera.rotation.set(cam.pitch,cam.yaw,0);
  var spd=3.5,fwd=new THREE.Vector3(-Math.sin(cam.yaw),0,-Math.cos(cam.yaw));
  var rgt=new THREE.Vector3(Math.cos(cam.yaw),0,-Math.sin(cam.yaw));
  if(keys.w)camera.position.addScaledVector(fwd,spd*dt);if(keys.s)camera.position.addScaledVector(fwd,-spd*dt);
  if(keys.a)camera.position.addScaledVector(rgt,-spd*dt);if(keys.d)camera.position.addScaledVector(rgt,spd*dt);
  if(Math.abs(si)>0.001){camera.position.addScaledVector(fwd,si*6*dt);si*=Math.pow(0.001,dt);}
  camera.position.x=Math.max(-HW+0.5,Math.min(HW-0.5,camera.position.x));
  camera.position.z=Math.max(-HL+1.5,Math.min(HL-1.5,camera.position.z));
  camera.position.y=1.65;
  document.getElementById('hfill').style.width=(Math.max(0,Math.min(1,1-(camera.position.z+HL)/L))*100).toFixed(1)+'%';
  renderer.render(scene,camera);}
animate();
